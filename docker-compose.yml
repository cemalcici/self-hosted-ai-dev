services:
  aidev:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      UI_PASSWORD: ${UI_PASSWORD}
      OPENCODE_PORT: ${OPENCODE_PORT}
      OPENCHAMBER_PORT: ${OPENCHAMBER_PORT}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
    volumes:
      - opencode_config:/home/aidev/.config/opencode
      - opencode_data:/home/aidev/.local/share/opencode
      - openchamber_config:/home/aidev/.config/openchamber
      - workspace:/workspace
      - ./config/oh-my-opencode-slim.jsonc:/home/aidev/.config/opencode/oh-my-opencode-slim.jsonc

volumes:
  opencode_config:
  opencode_data:
  openchamber_config:
  workspace:
